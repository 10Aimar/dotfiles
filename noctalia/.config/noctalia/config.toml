[dock]
auto_hide = true
background_opacity = 0.0
enabled = true
icon_size = 65
monitors = [ "DP-1" ]
pinned = [ "com.spotify.Client", "net.thunderbird.Thunderbird", "org.kde.dolphin", "org.mozilla.firefox" ]
reserve_space = false
show_dots = true

[idle]
behavior_order = [ "lock", "screen-off", "lock-and-suspend" ]
pre_action_fade_seconds = 0

    [idle.behavior.lock]
    action = "lock"
    enabled = true
    timeout = 600.0

    [idle.behavior.lock-and-suspend]
    action = "lock_and_suspend"
    enabled = false
    timeout = 900.0

    [idle.behavior.screen-off]
    action = "screen_off"
    enabled = false
    timeout = 660.0

[location]
address = "Lisbon"

