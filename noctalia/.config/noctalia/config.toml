[nightlight]
enabled = true
temperature_day = 4500
temperature_night = 3000

[osd]
monitors = [ "DP-1" ]

[shell]
niri_overview_type_to_launch_enabled = true
password_style = "random"
screen_time_enabled = true
settings_show_advanced = true
telemetry_enabled = true

    [shell.mpris]
    blacklist = [ "firefox" ]

    [shell.panel]
    open_near_click_control_center = true
    open_near_click_session = true
    open_near_click_wallpaper = true
    session_placement = "floating"
    transparency_mode = "soft"
    wallpaper_placement = "floating"

[system.monitor]
disk_poll_seconds = 0
gpu_poll_seconds = 5

[theme]
builtin = "Tokyo-Night"
community_palette = "Catppuccin Macchiato Pink"
source = "community"
wallpaper_scheme = "m3-content"

    [theme.templates]
    builtin_ids = [ "gtk3", "gtk4", "kcolorscheme", "niri", "qt", "starship" ]
    community_ids = [ "spicetify", "pywalfox", "steam" ]

[wallpaper.default]
path = "/home/dockas/Pictures/Wallpapers/Illustrated.png"

[wallpaper.last]
path = "/home/dockas/Pictures/Wallpapers/Illustrated.png"

[wallpaper.monitors.DP-1]
path = "/home/dockas/Pictures/Wallpapers/Illustrated.png"

[wallpaper.monitors.HDMI-A-1]
path = "/home/dockas/Pictures/Wallpapers/Illustrated.png"

[widget.LocknSusp]
color = "secondary"
command = "noctalia msg session lock"
glyph = "lock"
right_command = "noctalia msg session lock-and-suspend"
type = "custom_button"

[widget.clock]
font_weight = 1000

[widget.cpu]
display = "graph"

[widget.launcher]
color = "tertiary"
custom_image = "/usr/share/noctalia/assets/images/distros/fedora.svg"
custom_image_colorize = true
scale = 1.5

[widget.media]
capsule_border = "error"
hide_when_no_media = true
title_scroll = "on_hover"

[widget.network]
show_label = false

[widget.session]
capsule = true
color = "error"

[widget.sysmon]
display = "text"
glyph = "gpu-usage"
stat = "gpu_temp"

[widget.temp]
display = "text"

[widget.tray]
drawer = true
pinned = [ "steam", "coolercontrol" ]
scale = 1.2

[widget.volume]
show_label = false

[widget.wallpaper]
scale = 1.3

[widget.workspaces]
capsule_border = "tertiary"
hide_when_empty = true
